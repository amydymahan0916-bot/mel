<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>بافت مو ملی</title>

<style>
  body{
    margin:0;
    font-family:tahoma;
    background:#ffc0cb;
  }

  header{
    text-align:center;
    padding:20px;
  }

  .profile{
    width:110px;
    height:110px;
    border-radius:50%;
    object-fit:cover;
    border:4px solid white;
  }

  h1{
    margin:10px 0;
  }

  .grid{
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:10px;
    padding:15px;
  }

  .card{
    background:white;
    border-radius:12px;
    overflow:hidden;
    cursor:pointer;
    box-shadow:0 3px 10px rgba(0,0,0,0.1);
    transition:0.3s;
  }

  .card:hover{
    transform:scale(1.03);
  }

  .card img{
    width:100%;
    height:120px;
    object-fit:cover;
  }

  .card h3{
    margin:8px;
    font-size:14px;
  }

  .card p{
    margin:0 8px 10px;
    font-size:12px;
    color:#444;
  }

  /* modal */
  .modal{
    display:none;
    position:fixed;
    top:0;
    right:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.6);
  }

  .modal-content{
    background:white;
    width:90%;
    margin:50px auto;
    padding:15px;
    border-radius:12px;
  }

  .btn{
    display:block;
    text-align:center;
    background:#25d366;
    color:white;
    padding:10px;
    margin-top:10px;
    border-radius:8px;
    text-decoration:none;
  }

  .close{
    float:left;
    cursor:pointer;
    font-size:18px;
  }
</style>
</head>

<body>

<header>
  <img src="profile.jpg" class="profile">
  <h1>بافت مو ملی 💖</h1>
</header>

<div class="grid" id="grid"></div>

<!-- modal -->
<div class="modal" id="modal">
  <div class="modal-content">
    <span class="close" onclick="closeModal()">✖</span>
    <h2 id="title"></h2>
    <p id="desc"></p>
    <p id="price"></p>

    <a class="btn" id="orderBtn" href="#">ثبت سفارش</a>
  </div>
</div>

<script>
const data = [
{
title:"بافت مهره",
price:"150 تا 300 هزار",
desc:"بافت با مهره های رنگی به صورت یک لاین روی مو",
img:"mehre.jpg"
},
{
title:"بافت خورشیدی",
price:"300 هزار",
desc:"مثل بافت هلندی ولی با تقسیم بندی متفاوت",
img:"khorshidi.jpg"
},
{
title:"بافت تل",
price:"300 تا 350 هزار",
desc:"تل فرق، تل یک طرف، تل خورشیدی با مهره و نخ",
img:"tel.jpg"
},
{
title:"بافت سوسکی",
price:"100 هزار",
desc:"مدل ساده و شیک",
img:"soosaki.jpg"
},
{
title:"اکستنشن بافت شاخه ای",
price:"30 هزار تا 1200",
desc:"بافت دور سر همراه امکان افزایش قد مو",
img:"extension.jpg"
},
{
title:"بافت دندون موشی",
price:"1200 هزار",
desc:"مدل خاص و پرطرفدار",
img:"dandoon.jpg"
},
{
title:"بافت کویین",
price:"400 هزار",
desc:"بافت سه بعدی تاج‌گونه مخصوص مراسم",
img:"queen.jpg"
},
{
title:"بافت هلندی دیزاین دار",
price:"150 هزار",
desc:"با مهره، حلقه و نخ",
img:"holandi.jpg"
}
];

const grid = document.getElementById("grid");

data.forEach((item,i)=>{
  grid.innerHTML += `
  <div class="card" onclick="openModal(${i})">
    <img src="${item.img}">
    <h3>${item.title}</h3>
    <p>${item.price}</p>
  </div>`;
});

function openModal(i){
  document.getElementById("modal").style.display="block";
  document.getElementById("title").innerText=data[i].title;
  document.getElementById("desc").innerText=data[i].desc;
  document.getElementById("price").innerText="قیمت: "+data[i].price;

  document.getElementById("orderBtn").href=
  "https://wa.me/989000000000?text=سلام سفارش "+data[i].title;
}

function closeModal(){
  document.getElementById("modal").style.display="none";
}
</script>

</body>
</html>
