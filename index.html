<!-- فایل را با نام index.html ذخیره کن -->

<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>بافت مو ملی</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:tahoma,sans-serif;
}

body{
    background:#ffd6e7;
    color:#333;
}

header{
    text-align:center;
    padding:40px 20px;
    background:#ff9fc6;
    color:white;
}

.profile{
    width:180px;
    height:180px;
    border-radius:50%;
    object-fit:cover;
    border:6px solid white;
    margin-bottom:15px;
}

.gallery{
    max-width:1300px;
    margin:auto;
    padding:30px;
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(250px,1fr));
    gap:20px;
}

.card{
    background:white;
    border-radius:15px;
    overflow:hidden;
    cursor:pointer;
}

.card img{
    width:100%;
    height:250px;
    object-fit:cover;
}

.price{
    text-align:center;
    color:#e91e63;
    padding-bottom:15px;
    font-weight:bold;
}
</style>
</head>

<body>

<header>
<img src="profile.jpg" class="profile">
<h1>بافت مو ملی</h1>
<p>انواع بافت مو و اکستنشن تخصصی</p>
</header>

<div class="gallery">

<div class="card">
<img src="mehre.jpg">
<h3>بافت مهره</h3>
<div class="price">150 تا 300 هزار تومان</div>
</div>

<div class="card">
<img src="khorshidi.jpg">
<h3>بافت خورشیدی</h3>
<div class="price">300 هزار تومان</div>
</div>

<div class="card">
<img src="tel.jpg">
<h3>بافت تل</h3>
<div class="price">300 تا 350 هزار تومان</div>
</div>

<div class="card">
<img src="soosaki.jpg">
<h3>بافت سوسکی</h3>
<div class="price">100 هزار تومان</div>
</div>

<div class="card">
<img src="extension.jpg">
<h3>اکستنشن شاخه‌ای</h3>
<div class="price">30 هزار تومان هر شاخه</div>
</div>

<div class="card">
<img src="queen.jpg">
<h3>بافت کویین</h3>
<div class="price">400 هزار تومان</div>
</div>

</div>

</body>
</html>
