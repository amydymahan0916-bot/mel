<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>بافت مو ملی</title>

<link rel="stylesheet" href="style.css">

<style>
body{font-family:tahoma;margin:0}
header{text-align:center;padding:20px}
.profile{width:120px;height:120px;border-radius:50%;object-fit:cover}
.grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:10px;
  padding:10px;
}
.card img{
  width:100%;
  border-radius:10px;
  height:200px;
  object-fit:cover;
}
.modal{
  display:none;
  position:fixed;
  top:0;right:0;left:0;bottom:0;
  background:rgba(0,0,0,0.7);
  justify-content:center;
  align-items:center;
}
.modal-content{
  background:white;
  padding:15px;
  border-radius:10px;
  width:90%;
}
.modal-content img{
  width:100%;
  border-radius:10px;
}
.close-btn{
  position:absolute;
  top:10px;
  left:10px;
}
</style>

</head>

<body>

<header>
  <img src="images/profile.jpg" class="profile">
  <h1>بافت مو ملی</h1>
  <p>انواع بافت مو حرفه‌ای</p>
</header>

<section>
  <div class="grid" id="gallery"></div>
</section>

<!-- مودال -->
<div class="modal" id="modal">
  <div class="modal-content">

    <button class="close-btn" onclick="closeModal()">✕</button>

    <img id="modalImage">
    <h2 id="modalTitle"></h2>
    <p id="modalDescription"></p>
    <p id="modalPrice"></p>

  </div>
</div>

<script src="script.js"></script>

</body>
</html>
