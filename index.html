<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>گالری بافت مو</title>

  <style>
    body{
      font-family: sans-serif;
      background: #f5f5f5;
      margin: 0;
      padding: 20px;
      text-align: center;
    }

    h1{
      margin-bottom: 20px;
    }

    .gallery{
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
    }

    .item{
      background: white;
      border-radius: 12px;
      padding: 10px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      transition: 0.3s;
    }

    .item:hover{
      transform: scale(1.03);
    }

    .item img{
      width: 100%;
      height: 220px;
      object-fit: cover;
      border-radius: 10px;
    }

    .name{
      margin-top: 10px;
      font-weight: bold;
      font-size: 14px;
    }

    @media(max-width: 900px){
      .gallery{
        grid-template-columns: repeat(2, 1fr);
      }
    }

    @media(max-width: 600px){
      .gallery{
        grid-template-columns: repeat(1, 1fr);
      }
    }
  </style>
</head>

<body>

<h1>گالری بافت مو</h1>

<div class="gallery">
