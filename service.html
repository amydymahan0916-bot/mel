<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>جزئیات بافت</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:tahoma;
}

body{
background:linear-gradient(135deg,#ffd6e7,#ffc2dc);
padding:20px;
}

.container{
max-width:900px;
margin:auto;
}

.back-btn{
display:inline-block;
margin-bottom:20px;
padding:12px 20px;
background:white;
border-radius:15px;
text-decoration:none;
color:#d63384;
font-weight:bold;
box-shadow:0 5px 15px rgba(0,0,0,.1);
}

.main-image{
width:100%;
height:450px;
object-fit:cover;
border-radius:25px;
box-shadow:0 10px 25px rgba(0,0,0,.15);
}

.box{
background:white;
padding:25px;
border-radius:25px;
margin-top:20px;
box-shadow:0 5px 20px rgba(0,0,0,.1);
}

.title{
font-size:35px;
color:#d63384;
margin-bottom:15px;
}

.price{
font-size:25px;
font-weight:bold;
color:#e91e63;
margin:15px 0;
}

.info{
background:#fff3f8;
padding:15px;
border-radius:15px;
margin-top:15px;
line-height:2;
}

.order-btn{
width:100%;
padding:15px;
margin-top:20px;
border:none;
border-radius:15px;
background:#e91e63;
color:white;
font-size:18px;
cursor:pointer;
}

.contact-box{
display:none;
margin-top:20px;
background:#fff3f8;
padding:20px;
border-radius:15px;
}

.contact-item{
background:white;
padding:15px;
border-radius:15px;
margin-top:10px;
}

.copy-btn{
width:100%;
padding:10px;
margin-top:10px;
border:none;
border-radius:10px;
background:#d63384;
color:white;
cursor:pointer;
}

.badge{
display:inline-block;
padding:8px 15px;
background:#d63384;
color:white;
border-radius:30px;
margin-bottom:15px;
}

@media(max-width:768px){

.main-image{
height:280px;
}

.title{
font-size:28px;
}

}

</style>

</head>

<body>

<div class="container">

<a href="index.html" class="back-btn">
← بازگشت به صفحه اصلی
</a>

<img id="serviceImage" class="main-image">

<div class="box">

<div class="badge">
نمونه کار حرفه‌ای
</div>

<h1 id="serviceTitle" class="title"></h1>

<p class="price" id="servicePrice"></p>

<div class="info">

<p id="serviceDescription"></p>

<br>

<p>✨ اجرای حرفه‌ای</p>

<p>💎 استفاده از متریال باکیفیت</p>

<p>📸 مناسب عکاسی و مراسمات</p>

<p>⏳ ماندگاری بالا</p>

</div>

<button class="order-btn" onclick="showContact()">
ثبت سفارش
</button>

<div class="contact-box" id="contactBox">

<h3>راه‌های ارتباطی</h3>

<div class="contact-item">

<p>📞 شماره تماس</p>

<p><b>+989199029625</b></p>

<button class="copy-btn"
onclick="copyText('+989199029625')">
کپی شماره
</button>

</div>

<div class="contact-item">

<p>💬 آیدی روبیکا</p>

<p><b>@M_farhadi_84</b></p>

<button class="copy-btn"
onclick="copyText('@M_farhadi_84')">
کپی آیدی
</button>

</div>

</div>

</div>

</div>

<script>

const item = JSON.parse(
localStorage.getItem("selectedService")
);

if(item){

document.getElementById("serviceTitle").innerText =
item.name;

document.getElementById("servicePrice").innerText =
item.price;

document.getElementById("serviceDescription").innerText =
item.description;

document.getElementById("serviceImage").src =
item.image;

}

function showContact(){

document.getElementById("contactBox").style.display =
"block";

}

function copyText(text){

navigator.clipboard.writeText(text);

alert("کپی شد ✅");

}

</script>

</body>

</html>
